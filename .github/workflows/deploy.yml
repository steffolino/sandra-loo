name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Import OpenStreetMap data
        run: npm run import:osm
        env:
          CITIES: Leipzig,Frankfurt am Main
          OSM_IMPORT_ALLOW_STALE: "true"

      - name: Import Leipzig Open Data
        run: npm run import:leipzig
        env:
          LEIPZIG_RESOURCE_ID: ${{ vars.LEIPZIG_RESOURCE_ID }}
          LEIPZIG_DATASET_ID: offentliche-toiletten-stadt-leipzig1

      - name: Import Frankfurt Open Data
        run: npm run import:frankfurt
        env:
          FRANKFURT_WFS_URL: ${{ vars.FRANKFURT_WFS_URL }}
          FRANKFURT_DATASET_ID: oeffentliche-wc-anlagen

      - name: Verify Leipzig + Frankfurt imports
        run: |
          node <<'NODE'
          const fs = require('fs')
          const base = 'data/imports'
          const read = (file) => JSON.parse(fs.readFileSync(`${base}/${file}`, 'utf8'))

          const leipzig = read('leipzig.json').length
          const frankfurt = read('frankfurt.json').length

          if (leipzig <= 0 || frankfurt <= 0) {
            console.error(`Import check failed: leipzig=${leipzig}, frankfurt=${frankfurt}`)
            process.exit(1)
          }

          console.log(`Import check passed: leipzig=${leipzig}, frankfurt=${frankfurt}`)
          NODE

      - name: Generate static site
        run: npm run generate
        env:
          NUXT_APP_BASE_URL: /${{ github.event.repository.name }}/

      - name: List generated output (debug)
        run: |
          echo "Listing .output/public top-level files"
          ls -la .output/public || true
          echo "Listing .output/public/api (if present)"
          ls -la .output/public/api || true
          echo "Listing .output/public/api/toilets (if present)"
          ls -la .output/public/api/toilets || true
          echo "Show .output/public/api/toilets/index content (first 200 lines)"
          if [ -f .output/public/api/toilets/index ]; then
            echo "=== INDEX START ==="
            head -n 200 .output/public/api/toilets/index || true
            echo "=== INDEX END ==="
          fi

      - name: Create fallback static API payload
        run: |
          echo "Creating fallback /api/toilets/index from data/imports"
          node scripts/smoke/write-api-payload.mjs

      - name: Run deploy smoke check
        run: npm run smoke:deploy

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
